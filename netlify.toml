# The Flutter web build no longer runs on Netlify. It runs in GitHub
# Actions (.github/workflows/deploy-web.yml) which uploads sources +
# source maps to Sentry and then pushes the built artifact here via the
# Netlify CLI. Netlify only serves the CDN and runs the functions below.
#
# Auto-publishing from Git should be turned off in the Netlify dashboard
# (Site settings -> Build & deploy -> Continuous deployment -> Stop
# builds) so a stray push does not race the GH Actions deploy.

# Cache policy: keep index fresh, fingerprinted assets long-lived
[[headers]]
    for = "/index.html"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/*.drill"
    [headers.values]
        Content-Type = "application/vnd.ringdrill+zip"
        Content-Disposition = "attachment"

[[headers]]
    for = "/assets/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/canvaskit/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/main.dart.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter_bootstrap.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/manifest.json"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter_service_worker.js"
    [headers.values]
        Cache-Control = "no-cache"

[functions]
    directory = "netlify/functions"

# Public API aliases.
#
# Two forms are supported. Both route to the same Netlify function.
#
# Function-name form (`/api/<function-name>`) is what DrillClient uses
# after the ADR-0039 Phase 2a refactor. Dash-separated because that is
# how the .js files are named under netlify/functions/ and the Netlify
# function name equals the file basename.
#
# REST-style slash-form (`/api/<noun>/<verb>`) is the canonical public
# API surface referenced by docs, ADRs, plans/, robots.txt and external
# consumers. Kept as a stable alias so those references never break
# even if the client's URL construction changes.
#
# The direct `/.netlify/functions/<name>` path always works too — it is
# served natively by Netlify and does not require an entry here. The
# old cached PWA on apex still uses it, and continues to.
[[redirects]]
    from = "/api/drills-upload"
    to = "/.netlify/functions/drills-upload"
    status = 200

[[redirects]]
    from = "/api/drills-head/*"
    to = "/.netlify/functions/drills-head/:splat"
    status = 200

[[redirects]]
    from = "/api/market-feed"
    to = "/.netlify/functions/market-feed"
    status = 200

[[redirects]]
    from = "/api/drills-admin"
    to = "/.netlify/functions/drills-admin"
    status = 200

[[redirects]]
    from = "/api/drills/upload"
    to = "/.netlify/functions/drills-upload"
    status = 200

[[redirects]]
    from = "/api/drills/head/*"
    to = "/.netlify/functions/drills-head/:splat"
    status = 200

[[redirects]]
    from = "/api/market/feed"
    to = "/.netlify/functions/market-feed"
    status = 200

[[redirects]]
    from = "/api/admin"
    to = "/.netlify/functions/drills-admin"
    status = 200

# Interactive API reference and its OpenAPI spec.
[[redirects]]
    from = "/api/docs"
    to = "/.netlify/functions/api-docs"
    status = 200

[[redirects]]
    from = "/api/openapi.json"
    to = "/.netlify/functions/openapi"
    status = 200

# Catch-all for unknown /api/* paths. MUST stay below every real /api/ entry
# above (first match wins) and above the SPA fallback (`/* -> /index.html`)
# below. Without it, an unknown /api/ path serves the app shell with HTTP 200;
# the function returns a JSON 404 instead. The rewrite status is 200 so the
# function's own 404 status flows through to the client.
[[redirects]]
    from = "/api/*"
    to = "/.netlify/functions/api-not-found"
    status = 200

[[redirects]]
    from = "/i/*"
    to = "/.netlify/functions/drills-preview?slug=:splat"
    status = 200

[[redirects]]
    from = "/brief/program/*"
    to = "https://web.ringdrill.app/brief/program/:splat"
    status = 302

[[redirects]]
    from = "/brief/*"
    to = "https://web.ringdrill.app/brief/:splat"
    status = 302

[[redirects]]
    from = "/d/*"
    to = "/.netlify/functions/deep-link/:splat"
    status = 200

# Serve .well-known files as-is (before the SPA catch-all)
[[redirects]]
    from = "/.well-known/*"
    to = "/.well-known/:splat"
    status = 200

# Optional but recommended: ensure correct headers
[[headers]]
    for = "/.well-known/assetlinks.json"
    [headers.values]
        Content-Type = "application/json; charset=utf-8"
        Cache-Control = "public, max-age=3600"

# Apple Universal Links: the AASA file has no extension and MUST be JSON (ADR-0021)
[[headers]]
    for = "/.well-known/apple-app-site-association"
    [headers.values]
        Content-Type = "application/json"
        Cache-Control = "public, max-age=3600"

# Single Page App routing: deep links -> index.html
[[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200