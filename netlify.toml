# The Flutter web build no longer runs on Netlify. It runs in GitHub
# Actions (.github/workflows/deploy-web.yml) which uploads sources +
# source maps to Sentry and then pushes the built artifact here via the
# Netlify CLI. Netlify only serves the CDN and runs the functions below.
#
# Auto-publishing from Git should be turned off in the Netlify dashboard
# (Site settings -> Build & deploy -> Continuous deployment -> Stop
# builds) so a stray push does not race the GH Actions deploy.

# Cache policy: keep index fresh, fingerprinted assets long-lived
[[headers]]
    for = "/index.html"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/*.drill"
    [headers.values]
        Content-Type = "application/vnd.ringdrill+zip"
        Content-Disposition = "attachment"

[[headers]]
    for = "/assets/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/canvaskit/*"
    [headers.values]
        Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
    for = "/main.dart.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter_bootstrap.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter.js"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/manifest.json"
    [headers.values]
        Cache-Control = "no-cache"

[[headers]]
    for = "/flutter_service_worker.js"
    [headers.values]
        Cache-Control = "no-cache"

[functions]
    directory = "netlify/functions"

[[redirects]]
    from = "/api/drills/upload"
    to = "/.netlify/functions/drills-upload"
    status = 200

[[redirects]]
    from = "/api/drills/head/*"
    to = "/.netlify/functions/drills-head/:splat"
    status = 200

[[redirects]]
    from = "/d/*"
    to = "/.netlify/functions/deep-link/:splat"
    status = 200

[[redirects]]
    from = "/api/market/feed"
    to  = "/.netlify/functions/market-feed"
    status = 200

[[redirects]]
    from = "/api/admin"
    to  = "/.netlify/functions/drills-admin"
    status = 200

# Serve .well-known files as-is (before the SPA catch-all)
[[redirects]]
    from = "/.well-known/*"
    to = "/.well-known/:splat"
    status = 200

# Optional but recommended: ensure correct headers
[[headers]]
    for = "/.well-known/assetlinks.json"
    [headers.values]
        Content-Type = "application/json; charset=utf-8"
        Cache-Control = "public, max-age=3600"

# Single Page App routing: deep links -> index.html
[[redirects]]
    from = "/*"
    to = "/index.html"
    status = 200