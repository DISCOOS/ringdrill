name: ringdrill
description: "Plan, synchronize and execute station-based drills with teams and supervisors."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.3+17

environment:
  sdk: ^3.8.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  sentry_flutter: ^9.6.0
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  nanoid: ^1.0.0
  strings: ^4.0.1 # needed for flutter_map
  latlong2: ^0.9.1
  markdown_widget: ^2.3.2+8
  # markdown is pulled in transitively by markdown_widget, but we depend on
  # its public API directly (InlineSyntax for the <mark>/<curr-mark> search
  # highlight syntax in lib/views/widgets/brief_markdown.dart).
  markdown: ^7.2.1
  upgrader: ^13.3.0
  flutter_map: ^8.2.2
  flutter_map_marker_cluster: ^8.2.2
  geolocator: ^14.0.1
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  osm_nominatim: ^4.0.1
  json_annotation: ^4.9.0
  crypto: ^3.0.6
  package_info_plus: ^10.1.0
  freezed_annotation: ^3.1.0
  shared_preferences: ^2.5.3
  shorebird_code_push: ^2.0.4
  flutter_local_notifications: ^21.0.0

  flutter_native_splash: ^2.4.6
  flutter_localizations:
    sdk: flutter
  intl: any
  path_provider: ^2.1.5
  path: ^1.9.1
  universal_io: ^2.2.2
  share_plus: ^13.1.0
  archive: ^4.0.7
  proj4dart: ^3.0.0
  web: ^1.1.1
  file_picker: ^12.0.0-beta.3
  go_router: ^17.2.3
  http: ^1.5.0
  meta: ^1.16.0
  mustache_template: ^2.0.0
  http_parser: ^4.1.2
  args: ^2.7.0

dev_dependencies:
  sentry_dart_plugin: ^3.1.1
  flutter_test:
    sdk: flutter
  visibility_detector: ^0.4.0+2

  build_runner: ^2.6.0
  freezed: ^3.2.0
  json_serializable: ^6.10.0
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#002C3F" # Background color
  image: assets/images/ringdrill-v2-1254x1254.png
  android: true
  ios: true
  web: true

  android_12:
    image: assets/images/ringdrill-v2-1254x1254.png
    icon_background_color: "#002C3F"
    image_dark: assets/images/ringdrill-v2-1254x1254.png
    icon_background_color_dark: "#002C3F"

flutter_launcher_icons:
  android: "launcher_icon"
  remove_alpha_ios: true
  ios:
    generate: true
  image_path: "assets/images/ringdrill-v2-1254x1254.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  web:
    generate: true
    image_path: "assets/images/ringdrill-v2-1254x1254.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/ringdrill-v2-1254x1254.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/ringdrill-v2-1254x1254.png"

flutter:
  # Enable localized messages generation
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true
  assets:
    - shorebird.yaml
    - assets/templates/ringdrill-standard-v1.nb.md.mustache

sentry:
  upload_sources: true
  upload_source_maps: true
  upload_debug_symbols: true
  project: ringdrill
  org: discoos
  log_level: debug

executables:
  ringdrill: ringdrill
